workflows:
  ios-release:
    name: iOS Release Build
    environment:
      xcode: latest
      ios_signing:
        distribution_type: development
        bundle_identifier: com.jb.pato.sports.app

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "JB Pato Atlas.xcodeproj" \
            --scheme "JB Pato Atlas"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
